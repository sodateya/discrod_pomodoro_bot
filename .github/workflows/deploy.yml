2月23日
そうですね。NASとsecretを同時に別ユーザーで使うのはWindowsの制限で難しいです。

解決策としては、secretをsodateyaユーザーでもアクセスできるようにするのが一番楽です。サーバー側で：

bash
sudo nano /etc/samba/smb.conf
[secret] の valid users を変更：

ini
[secret]
    path = /srv/samba/secret
    read only = No
    valid users = sodateya
    browseable = yes
    create mask = 0660
    directory mask = 0770
bash
sudo systemctl restart smbd
こうすればNASもsecretも sodateya ユーザーで入れます。ただしパスワードは sodateya のものになります。

「secretに別のパスワードをかけたい」という要件がある場合は別の方法が必要ですが、どうしますか？

secretに別のパスワードをかけたい

2月23日
Windowsの制限で、同じサーバーに異なるユーザーで同時接続できません。回避策としてWindowsの資格情報マネージャーを使う方法があります。

ただ正直に言うと、これはWindowsの仕様上かなり面倒で完全な解決が難しいです。

現実的な選択肢を2つ提案します：

①secretもsodateyaで入れるようにして、フォルダ自体を暗号化ソフトで保護する（VeraCryptなど）

②secretへのアクセスはMacだけにする（MacはWindowsと違い別ユーザーで同時接続できるので問題なし）

どちらがいいですか？それとも他の方法を試してみますか？

①secretもsodateyaで入れるようにして、フォルダ自体を暗号化ソフトで保護する（VeraCryptなど）
これはフォルダに入る前にパスワード入力するとかになる？

2月23日
そうです！VeraCryptの場合はこんな流れになります：

VeraCryptで暗号化されたボリューム（ファイル）を作成
使うときにVeraCryptを起動してパスワードを入力してマウント
マウントされた間だけ中身が見える
終わったらアンマウントすると暗号化されて見えなくなる
ただ毎回VeraCryptのソフトを起動してマウントする手間がかかります。MacとWindows両方にVeraCryptをインストールする必要もあります。

シンプルにパスワードで保護したいだけなら、ZIPファイルにパスワードをかけて保存する方がお手軽かもしれません。用途によって変わりますが、何を入れたいフォルダですか？


Rustとかきついかな？

2月23日
Rustはかなりきついです。

Rustのサーバーは最低でも16GB以上のRAMを推奨していて、Raspberry Piは最大8GBなのでスペック的に厳しいです。CPUもかなり要求されます。

Rustサーバーを立てるなら中古のPC（Core i5以上、16GB RAM）やVPS（月1,000〜2,000円程度）の方が現実的です。


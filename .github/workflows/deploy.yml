共通しているのは「コードが更新されたら自動で本番に反映する」という考え方で、今回やったことはその基本形です。

Discordボットくらいの規模なら今の構成で十分ですが、ユーザーが使っているサービスだとダウンタイムを最小にする工夫が必要になります。


TailscaleはVPNの一種で、異なるネットワークにあるデバイス同士を同じローカルネットワークにいるように繋げるサービスです。

具体的には：

自宅のRaspberry Pi
GitHubのサーバー
自分のMacやスマホ
これらをインターネット越しに安全に繋げます。

今回のCDに使いたい理由は、GitHubのサーバーから自宅のRaspberry PiにSSHで接続するためです。普通は自宅のルーターがブロックしてしまうので外からSSHできませんが、Tailscaleを使えば簡単に繋げられます。

ただTailscaleを使わない方法もあります。GitHub Actionsの代わりにRaspberry Pi側から定期的にGitHubを確認してpullする方法です。これならTailscaleなしで実現できます。どっちがいいですか？


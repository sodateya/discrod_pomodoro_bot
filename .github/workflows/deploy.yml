lost+found以外のものをshoredにもってきましょう

2月23日
lost+found 以外を全部 shared に移動するコマンドです：

bash
sudo find /mnt/nas -maxdepth 1 ! -name 'lost+found' ! -path '/mnt/nas' -exec mv {} /mnt/nas/shared/ \;
その後確認：

bash
ls /mnt/nas/shared
ちゃんと移動できていたら smb.conf の [NAS] のパスを /mnt/nas/shared に戻してください。


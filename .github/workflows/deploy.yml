2月23日
危険ではありますが、適切な対策をすれば現実的に運用できます。

リスク

外部に公開するということは攻撃対象になる
設定ミスがあると全データが漏洩する可能性
安全にやる方法

一番おすすめは**VPN（WireeguardやTailscale）**です。ストレージを直接公開するのではなく、まず自宅のVPNに接続してからアクセスする方式です。Tailscaleなら設定が非常に簡単で、無料で使えます。

直接公開する方法（ポート開放）は手軽ですが、設定をしっかりしないと危ないのであまりおすすめしません。

Tailscaleを入れれば外出先からスマホでNASにアクセスしたり、胞子培養の温湿度データを外から確認したりもできます。試してみますか？


2月23日
はい、以下のコマンドで一発で書き換えられます：

bash
sudo tee /etc/samba/smb.conf << 'EOF'
[global]
    workgroup = WORKGROUP
    server role = standalone server
    map to guest = Bad User

[NAS]
    path = /mnt/nas
    read only = No
    valid users = sodateya

[secret]
    path = /srv/samba/secret
    read only = No
    valid users = sambauser
    browseable = yes
    create mask = 0660
    directory mask = 0770
EOF
これで既存の内容が丸ごと上書きされます。その後 sudo systemctl restart smbd で再起動してください。

NASの中に/Volumes/NAS/lost+foundがいるんだけどなにこれ

2月23日
lost+found はLinuxのファイルシステム（ext4など）が自動的に作るフォルダで、fsck（ディスク修復ツール）が壊れたファイルを回収する場所です。

削除しても問題ないですが、次回ディスクチェック時にまた自動生成されます。そのまま放置でOKです。

ここにいると邪魔なんだよなー

2月23日
Sambaの設定で lost+found を除外することはできないですが、NASフォルダへのアクセスユーザーを別のディレクトリに向けるか、もしくは単純に気にしないのが現実的です。

どうしても隠したいなら、/mnt/nas 直下ではなくサブフォルダを共有する方法があります：

bash
sudo mkdir /mnt/nas/shared
sudo chown sodateya:sodateya /mnt/nas/shared
smb.conf の [NAS] のパスを変更：

ini
[NAS]
    path = /mnt/nas/shared
    read only = No
    valid users = sodateya
bash
sudo systemctl restart smbd
これで lost+found は見えなくなります。


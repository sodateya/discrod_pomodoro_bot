NASに別のユーザーで既に接続されているのが原因です。エクスプローラーでNASのマウントを切断してから試してみてください。

まずNASへの接続を切断：

cmd
net use \\192.168.1.3\NAS /delete
その後：

cmd
net use \\192.168.1.3\secret /user:sambauser Takuya2208@

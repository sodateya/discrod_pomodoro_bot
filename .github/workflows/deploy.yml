iPhoneに入ってる写真をぜんぶナスに持って行きたいんだけどいい方法ある？

2:03
いくつか方法があります：

一番簡単な方法はNextcloudです。 Raspberry PiにNextcloudを入れてiPhoneアプリからNASに自動バックアップできます。Googleフォトみたいな感じです。

もしくはSMBで直接コピーする方法もありますが、iPhoneのファイルアプリからだと写真ライブラリに直接アクセスできないので少し面倒です。

Nextcloudを試してみますか？

Nextcloudについて説明して

2:04
Nextcloudは自前のGoogleドライブ＋Googleフォトみたいなものです。

主な機能はこんな感じです：

iPhoneの写真・動画を自動バックアップ
PCやスマホからファイルのアップロード・ダウンロード
写真をアルバムで管理
複数人で共有フォルダを使える
カレンダーや連絡先の同期もできる
メリットはデータがすべて自分のNASに保存されるので完全プライベートで、容量制限がないことです。

デメリットはインストールと設定が少し複雑なことと、Raspberry Piだと動作が少し重い場合があることです。

写真バックアップだけが目的なら試してみる価値はあります。やってみますか？

自動でどういうこと？定期的に同期するの？

2:05
そうです！iPhoneにNextcloudアプリを入れると、設定で**「自動アップロード」**をオンにできます。

具体的には：

Wi-Fiに繋いだとき自動的に新しい写真をNASにアップロード
充電中に自動同期する設定もできる
新しく撮った写真が自動でバックアップされる
Googleフォトと同じ感覚で使えます。

それはフォルダ指定して明日からはこのフォルダに，切り替えようとかできる？

2:06
はい、できます！Nextcloudのアプリで自動アップロードの設定をするとき、アップロード先のフォルダを自由に指定できます。

例えば：

/NAS/iPhoneバックアップ/2026 みたいなフォルダを作って指定する
後から別のフォルダに切り替えることも可能
ただし切り替えた場合、古いフォルダの写真はそのまま残って新しいフォルダに移動はされません。新しく撮った写真から新しいフォルダに入る感じです。

なんかアプリ取る感じる

2:06
そうですね、Nextcloudはサーバー側のインストールも少し複雑で、iPhoneアプリも必要です。

もっとシンプルな方法として、iPhoneのファイルアプリからSMBでNASに接続して手動でコピーする方法もあります。自動ではないですが、アプリなしでできます。

自動バックアップにこだわるならNextcloudがベストですが、どうしますか？

どう複雑なの？

2:07
Nextcloudのインストールは主に3ステップです：

サーバーにNextcloudをインストール → コマンドがそこそこ多い
データベースの設定 → MySQLかMariaDBが必要
Webサーバーの設定 → ApacheかNginxの設定が必要
今日すでにSamba、Jellyfin、Apacheを設定してきたので、慣れてきたと思いますが、Nextcloudはその中でも一番手間がかかります。

ただ一度設定してしまえば後は楽なので、やる気があればできると思いますよ！どうしますか？

ラズパイだと思いのは気がかりだな

2:07
それは正直な懸念ですね。Raspberry Piで動かすと：

画面の読み込みが遅い
写真が多いとスキャンに時間がかかる
複数人が同時アクセスすると重くなる
1人で使うなら何とか動きますが、快適かというと微妙です。

写真バックアップだけが目的ならNextcloudは少しオーバースペックかもしれません。もっとシンプルな方法としてSyncthingというアプリがあります。Nextcloudより軽くて設定も簡単で、iPhoneの写真をNASに自動同期できます。こっちの方がRaspberry Piには向いていると思います。

Syncthingについて教えて

2:08
Syncthingはデバイス間でフォルダを同期するソフトです。

特徴：

軽い・シンプル
サーバーを介さず直接デバイス間で同期
無料・オープンソース
Raspberry Piでも快適に動く
iPhoneの写真バックアップの流れ：

Raspberry PiにSyncthingをインストール
iPhoneにSyncthingアプリを入れる
iPhoneの写真フォルダとNASのフォルダをペアリング
Wi-Fi接続時に自動同期
デメリット：

iPhoneのSyncthingアプリが少し使いにくい
バックグラウンド同期がiOSの制限で完全自動にならない場合がある
iOSの制限のせいで完全自動は難しいですが、アプリを開いたときに自動で同期される感じです。試してみますか？


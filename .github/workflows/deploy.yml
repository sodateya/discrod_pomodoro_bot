2月23日
できます！ただソフト側で保存先を指定できる必要があります。

Windowsの場合、エクスプローラーでNASをネットワークドライブとして割り当てれば、OBSなどの録画ソフトで保存先としてそのドライブを指定できます。

注意点として、録画ファイルは大きいのでNASへの書き込み速度が遅いと録画がカクついたり失敗することがあります。有線LANで繋いでいれば大抵問題ないですが、Wi-Fiだと不安定になることがあります。


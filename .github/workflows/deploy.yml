    vfs objects = fruit streams_xattr
これをサンバのグローバルに入れればいいという記事をみたけどいけるかな

0:36
試してみる価値ありますね！これはMac向けのSamba最適化設定です。

bash
sudo nano /etc/samba/smb.conf
[global] に追加：

ini
[global]
    workgroup = WORKGROUP
    server role = standalone server
    map to guest = Bad User
    host msdfs = no
    vfs objects = fruit streams_xattr
保存して：

bash
sudo systemctl restart smbd
iPhoneのファイルアプリで再接続して試してみてください。

これしたら何が変わるの

0:37
vfs objects = fruit streams_xattr を追加すると主に以下が変わります：

iPhoneやMacからの書き込み互換性が向上する
.DS_Store などのMac特有のメタデータを正しく処理できるようになる
iPhoneのファイルアプリからの書き込みが動くようになる可能性がある
もともとiPhone・Mac向けのSamba最適化設定なので、今回の問題に直接効く可能性があります。試してみてください！

